[build]
  publish = "."
  
[[redirects]]
  from = "/login.php"
  to = "/login.html"
  status = 301
  
[[redirects]]
  from = "/register.php"
  to = "/register.html"
  status = 301
  
[[redirects]]
  from = "/index.php"
  to = "/home.html"
  status = 301
  
[[redirects]]
  from = "/*"
  to = "/home.html"
  status = 200
